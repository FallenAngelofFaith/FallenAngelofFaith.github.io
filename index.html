<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reena_Draws Art Gallery</title>

    <!-- Links -->

    <link rel="stylesheet" href="artGallery.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Neonderthaw&family=Updock&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header id="main-head">
      Reena_Draws
      <p id="head-description">
        A dedicated art gallery of my personal works and my story as an aspiring
        artist.
      </p>
      <div>
        <ul id="navbar">
          <li><a href="#">Home</a></li>
          <li><a href="#">Gallery</a></li>
          <li><a href="#">About Me</a></li>
          <li><a href="#">Contact Info</a></li>
        </ul>
      </div>
    </header>

    <article>
      <section title="Gallery" class="gallery-display">
        <div>
          <img
            src="/referenceFolder/friendsOC.jpg"
            alt="Friends Orignal Character"
          />
          <p class="description">Finished art of my Friends OC</p>
        </div>
        <div>
          <img
            src="/referenceFolder/friendsOCsketch.jpg"
            alt="Friends Orignal Character"
          />
          <p class="description">My Finished Sketch</p>
        </div>
        <div>
          <img src="/referenceFolder/firstPrint.jpg" alt="My First Print" />
          <p class="description">My First Print</p>
        </div>
      </section>
    </article>
  </body>
</html>
